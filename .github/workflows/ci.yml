name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          ENVIRONMENT: development
          SECRET_KEY: ci-test-secret-key-at-least-32-chars!!

  mobile-typecheck:
    name: Mobile type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint -- --max-warnings=0

      - name: Unit tests
        run: npm test

      - name: Expo Doctor
        run: npx expo-doctor

      - name: Validate iOS native plugin prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Validate Android native plugin prebuild
        run: npx expo prebuild --platform android --no-install

  web-build:
    name: Admin web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  deploy-background-services:
    name: Deploy monitoring workers
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, mobile-typecheck, web-build]
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install pinned Railway CLI
        run: npm install --global @railway/cli@4.40.0

      - name: Link Railway project
        run: |
          railway link \
            --project 9410157d-7061-44cc-b069-61934f4fdaf7 \
            --environment production

      - name: Confirm API deployment is healthy
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            status=$(railway service status \
              --service backend \
              --environment production \
              --json | jq -r '.status')
            health=$(curl --silent --show-error --max-time 10 \
              --output /dev/null --write-out '%{http_code}' \
              https://api.shieldai.rushingtechnologies.com/health || true)
            if [ "$status" = "SUCCESS" ] && [ "$health" = "200" ]; then
              exit 0
            fi
            echo "API is not ready yet (deployment=$status, health=$health, attempt=$attempt/30)."
            sleep 10
          done
          echo "API deployment did not become healthy; refusing to start schema-dependent workers."
          exit 1

      - name: Deploy Celery worker
        working-directory: backend
        run: |
          railway up . --path-as-root --detach \
            --project 9410157d-7061-44cc-b069-61934f4fdaf7 \
            --environment production \
            --service backend-worker \
            --message "${GITHUB_SHA}: Celery worker"

      - name: Deploy Celery scheduler
        working-directory: backend
        run: |
          railway up . --path-as-root --detach \
            --project 9410157d-7061-44cc-b069-61934f4fdaf7 \
            --environment production \
            --service backend-beat \
            --message "${GITHUB_SHA}: Celery beat"

      - name: Verify background services
        run: |
          set -euo pipefail
          for service in backend-worker backend-beat; do
            for attempt in $(seq 1 60); do
              status=$(railway service status \
                --service "$service" \
                --environment production \
                --json | jq -r '.status')
              if [ "$status" = "SUCCESS" ]; then
                break
              fi
              if [ "$status" = "FAILED" ] || [ "$status" = "CRASHED" ]; then
                echo "$service deployment failed with status $status."
                exit 1
              fi
              if [ "$attempt" = "60" ]; then
                echo "$service did not become healthy in time (last status: $status)."
                exit 1
              fi
              sleep 10
            done
          done
