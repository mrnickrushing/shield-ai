name: CI

# CI runs on pull requests only — it's the pre-merge quality gate.
#
# Deployment is handled by Railway's native GitHub auto-deploy on push to main,
# so a merge ships immediately. We intentionally do NOT run this workflow on
# push to main: Railway's "Wait for CI" gate would otherwise hold (and, if a run
# fails or Actions are unavailable, SKIP) every deploy. Keeping CI off the main
# push also avoids burning Actions minutes on commits that were already tested
# on their PR.
on:
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite+pysqlite:///:memory:
          ENVIRONMENT: development
          SECRET_KEY: ci-test-secret-key-at-least-32-chars!!

  mobile-typecheck:
    name: Mobile type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
