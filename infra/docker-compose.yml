services:
  db:
    image: postgres:16-alpine
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: shield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in infra/.env}
      POSTGRES_DB: shield_ai
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    tmpfs:
      - /run/postgresql
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shield"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    read_only: true
    security_opt:
      - no-new-privileges:true
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in infra/.env}"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - path: ../backend/.env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file:
      - path: ../backend/.env
        required: false
    depends_on:
      - redis
      - db

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file:
      - path: ../backend/.env
        required: false
    depends_on:
      - redis
      - db

volumes:
  pgdata:
  redisdata:
