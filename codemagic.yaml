workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: CyberLab ASC Key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.shieldai.app
      vars:
        BUNDLE_ID: com.shieldai.app
        EXPO_PUBLIC_API_URL: https://api.shieldai.rushingtechnologies.com
        CI: "1"
      node: "18"
      xcode: latest
      cocoapods: 1.15.2

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
      tag_patterns:
        - pattern: "v*"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Install JS dependencies
        working_directory: mobile
        script: npm ci

      - name: Expo prebuild (generate native iOS project)
        working_directory: mobile
        script: npx expo prebuild --clean --platform ios

      - name: Install CocoaPods
        working_directory: mobile/ios
        script: |
          # expo-share-intent leaves an orphaned PrivacyInfo.xcprivacy BuildFile with no
          # parent group; xcodeproj 1.27.0 raises when react-native calls real_path on it.
          # Wrap the call in a rescue so it falls through to the fallback path.
          sed -i '' 's/return existing_file\.real_path/begin; return existing_file.real_path; rescue; end/' \
            ../node_modules/react-native/scripts/cocoapods/privacy_manifest_utils.rb
          pod install

      - name: Set up code signing
        script: |
          PROFILES_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          SHARE_BUNDLE="${BUNDLE_ID}.share-extension"
          LOG=/tmp/shield_signing.log
          echo "=== Set up code signing $(date) ===" | tee -a "$LOG"

          # Remove locally-cached profiles for the share extension so
          # use-profiles only sees a fresh one. [ -e ] guard handles the
          # case where the glob doesn't match any files yet.
          for f in "$PROFILES_DIR"/*.mobileprovision; do
            [ -e "$f" ] || continue
            bid=$(security cms -D -i "$f" 2>/dev/null \
              | awk '/<key>application-identifier<\/key>/{getline; gsub(/.*<string>|<\/string>.*/,""); print}')
            if [[ "$bid" == *".share-extension"* || "$bid" == *"SharedExtension"* ]]; then
              echo "Removing stale cached profile: $f (bundle: $bid)" | tee -a "$LOG"
              rm -f "$f"
            fi
          done

          # Fetch the share-extension profile from Apple.
          # App Groups capability is pre-configured on the App ID (B23XNJ2MKG).
          app-store-connect fetch-signing-files "$SHARE_BUNDLE" \
            --type IOS_APP_STORE \
            --create 2>&1 | tee -a "$LOG"

          echo "=== Installed profiles ===" | tee -a "$LOG"
          for f in "$PROFILES_DIR"/*.mobileprovision; do
            [ -e "$f" ] || continue
            bid=$(security cms -D -i "$f" 2>/dev/null \
              | awk '/<key>application-identifier<\/key>/{getline; gsub(/.*<string>|<\/string>.*/,""); print}')
            grp=$(security cms -D -i "$f" 2>/dev/null \
              | awk '/<key>com.apple.security.application-groups<\/key>/{found=1} found && /<string>/{gsub(/.*<string>|<\/string>.*/,""); print; found=0}')
            echo "  $f" | tee -a "$LOG"
            echo "    app-id:     $bid" | tee -a "$LOG"
            echo "    app-groups: $grp" | tee -a "$LOG"
          done

          # Auto-assign profiles to project targets.
          xcode-project use-profiles 2>&1 | tee -a "$LOG"

          # Diagnostic: show ShareExtension bundle ID in pbxproj.
          grep -A2 "ShareExtension" \
            "$CM_BUILD_DIR/mobile/ios/ShieldAI.xcodeproj/project.pbxproj" 2>/dev/null \
            | grep "BUNDLE_IDENTIFIER\|PRODUCT_BUNDLE_IDENTIFIER" | head -4 | tee -a "$LOG" || true

          # Explicitly patch the pbxproj in case use-profiles couldn't resolve
          # a variable bundle ID reference for the ShareExtension target.
          python3 "$CM_BUILD_DIR/scripts/patch_share_extension_profile.py" 2>&1 | tee -a "$LOG"

      - name: Increment build number
        working_directory: mobile/ios
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST + 1))

      - name: Build IPA
        working_directory: mobile/ios
        script: |
          xcode-project build-ipa \
            --workspace ShieldAI.xcworkspace \
            --scheme ShieldAI \
            --archive-xcargs "SWIFT_TREAT_WARNINGS_AS_ERRORS=NO"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/shield_signing.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - nick@rushingtechnologies.com
        notify:
          success: false
          failure: false
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
