workflows:
  ota-update:
    name: OTA Update → Expo production
    max_build_duration: 15
    instance_type: linux_x2

    environment:
      vars:
        EXPO_PUBLIC_API_URL: https://api.shieldai.rushingtechnologies.com
        CI: "1"
      node: "20"

    triggering:
      cancel_previous_builds: true
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    when:
      changeset:
        includes:
          - mobile/

    scripts:
      - name: Install JS dependencies
        working_directory: mobile
        script: npm ci

      - name: Publish OTA update to production channel
        working_directory: mobile
        script: |
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN must be configured as a secure Codemagic variable."
            exit 1
          fi

          # codemagic.yaml is always part of the changeset (Codemagic includes it
          # by default), so a config-only edit still triggers this workflow even
          # though `when.changeset.includes: [mobile/]` matched nothing real.
          # Bail out here unless mobile/ actually changed in this push.
          if ! git diff --name-only HEAD~1 HEAD | grep -q '^mobile/'; then
            echo "No mobile/ changes in this push — skipping OTA publish."
            exit 0
          fi

          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "A newer main commit exists — refusing to publish stale OTA code."
            exit 0
          fi

          APP_VERSION=$(node -e "console.log(require('./app.json').expo.version)")
          npx eas-cli@21.0.1 update \
            --channel production \
            --platform ios \
            --message "OTA v${APP_VERSION} — $(date +%Y-%m-%d)" \
            --non-interactive

  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: CyberLab ASC Key

    environment:
      groups:
        # Provides CERTIFICATE_PRIVATE_KEY (secure app variable) — required by
        # `app-store-connect fetch-signing-files`; without it the signing step
        # fails immediately on push-triggered builds.
        - appstore_credentials
      vars:
        BUNDLE_ID: com.shieldai.app
        EXPO_PUBLIC_API_URL: https://api.shieldai.rushingtechnologies.com
        CI: "1"
      node: "20"
      xcode: latest
      cocoapods: 1.15.2

    triggering:
      cancel_previous_builds: true
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install JS dependencies
        working_directory: mobile
        script: npm ci

      - name: Verify key modules
        working_directory: mobile
        script: |
          echo "=== metro ===" && cat node_modules/metro/package.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['version'])"
          echo "=== js-polyfills ===" && cat node_modules/@react-native/js-polyfills/package.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['version'])"
          echo "=== css-interop ===" && cat node_modules/react-native-css-interop/package.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['version'])" 2>/dev/null || echo "not found (ok if nested)"

      - name: Expo prebuild (generate native iOS project)
        working_directory: mobile
        script: npx expo prebuild --clean --platform ios

      - name: Patch Expo.plist — embed OTA channel
        working_directory: mobile/ios
        script: |
          PLIST="ShieldAI/Supporting/Expo.plist"
          echo "=== Before patch ===" && /usr/libexec/PlistBuddy -c "Print :EXUpdatesRequestHeaders" "$PLIST" 2>/dev/null || echo "(no EXUpdatesRequestHeaders yet)"
          /usr/libexec/PlistBuddy -c "Add :EXUpdatesRequestHeaders dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :EXUpdatesRequestHeaders:expo-channel-name string production" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :EXUpdatesRequestHeaders:expo-channel-name production" "$PLIST"
          echo "=== After patch ===" && /usr/libexec/PlistBuddy -c "Print :EXUpdatesRequestHeaders" "$PLIST"

      - name: Install CocoaPods
        working_directory: mobile/ios
        script: |
          # expo-share-intent leaves an orphaned PrivacyInfo.xcprivacy BuildFile with no
          # parent group; xcodeproj 1.27.0 raises when react-native calls real_path on it.
          # Wrap the call in a rescue so it falls through to the fallback path.
          sed -i '' 's/return existing_file\.real_path/begin; return existing_file.real_path; rescue; end/' \
            ../node_modules/react-native/scripts/cocoapods/privacy_manifest_utils.rb
          pod install

      - name: Fetch fresh App Store signing files
        script: |
          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            echo "CERTIFICATE_PRIVATE_KEY is required for automatic iOS signing."
            echo "Add it as a secret Codemagic variable or pass it through the Build API."
            exit 1
          fi

          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          app-store-connect fetch-signing-files "$BUNDLE_ID.share-extension" \
            --type IOS_APP_STORE \
            --create
          app-store-connect fetch-signing-files "$BUNDLE_ID.calldirectory" \
            --type IOS_APP_STORE \
            --create
          app-store-connect fetch-signing-files "$BUNDLE_ID.widget" \
            --type IOS_APP_STORE \
            --create
          app-store-connect fetch-signing-files "$BUNDLE_ID.messagefilter" \
            --type IOS_APP_STORE \
            --create
          app-store-connect fetch-signing-files "$BUNDLE_ID.safari-extension" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up code signing
        script: |
          PROFILES_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          LOG=/tmp/shield_signing.log
          echo "=== Set up code signing $(date) ===" | tee -a "$LOG"

          echo "=== Installed profiles ===" | tee -a "$LOG"
          mkdir -p "$PROFILES_DIR"
          for f in "$PROFILES_DIR"/*.mobileprovision; do
            [ -e "$f" ] || continue
            bid=$(security cms -D -i "$f" 2>/dev/null \
              | awk '/<key>application-identifier<\/key>/{getline; gsub(/.*<string>|<\/string>.*/,""); print}')
            grp=$(security cms -D -i "$f" 2>/dev/null \
              | awk '/<key>com.apple.security.application-groups<\/key>/{found=1} found && /<string>/{gsub(/.*<string>|<\/string>.*/,""); print; found=0}')
            echo "  $f" | tee -a "$LOG"
            echo "    app-id:     $bid" | tee -a "$LOG"
            echo "    app-groups: $grp" | tee -a "$LOG"
          done

          # Assign installed profiles to Xcode project targets.
          #
          # Do NOT pass testFlightInternalTestingOnly here: that export option
          # brands the uploaded binary INTERNAL_ONLY in App Store Connect,
          # which permanently blocks attaching it to an App Store version
          # (greyed out in the "Add Build" picker with a 409). Internal
          # TestFlight testing works fine without the flag — it only restricts.
          xcode-project use-profiles 2>&1 | tee -a "$LOG"

          # Diagnostic: show ShareExtension bundle ID stored in pbxproj.
          grep -E "BUNDLE_IDENTIFIER|PRODUCT_BUNDLE_IDENTIFIER" \
            "$CM_BUILD_DIR/mobile/ios/ShieldAI.xcodeproj/project.pbxproj" 2>/dev/null \
            | grep -i share | head -4 | tee -a "$LOG" || true

          # Patch the pbxproj directly in case use-profiles couldn't resolve
          # the ShareExtension bundle ID (stored as a variable in the project).
          python3 "$CM_BUILD_DIR/scripts/patch_share_extension_profile.py" 2>&1 | tee -a "$LOG"

          # Same for the CallDirectoryExtension bundle ID.
          python3 "$CM_BUILD_DIR/scripts/patch_call_directory_extension_profile.py" 2>&1 | tee -a "$LOG"

          # Same for the WidgetExtension bundle ID.
          python3 "$CM_BUILD_DIR/scripts/patch_widget_extension_profile.py" 2>&1 | tee -a "$LOG"

          # Same for the MessageFilterExtension bundle ID.
          python3 "$CM_BUILD_DIR/scripts/patch_message_filter_extension_profile.py" 2>&1 | tee -a "$LOG"

          # Same for the SafariWebExtension bundle ID.
          python3 "$CM_BUILD_DIR/scripts/patch_safari_extension_profile.py" 2>&1 | tee -a "$LOG"

      - name: Increment build number
        working_directory: mobile/ios
        script: |
          # Small, auto-incrementing build number (Codemagic's per-project
          # counter) instead of a huge YYYYMMDDHHMM timestamp. Still strictly
          # ascending, so Apple never rejects an upload as a duplicate.
          agvtool new-version -all "${BUILD_NUMBER}"

      - name: Build IPA
        working_directory: mobile/ios
        script: |
          xcode-project build-ipa \
            --workspace ShieldAI.xcworkspace \
            --scheme ShieldAI \
            --archive-xcargs "SWIFT_TREAT_WARNINGS_AS_ERRORS=NO"

    artifacts:
      - mobile/ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/shield_signing.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - nick@rushingtechnologies.com
        notify:
          success: false
          failure: false
      app_store_connect:
        auth: integration
        submit_to_testflight: false
