<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shield AI logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="shield" x1="120" y1="64" x2="392" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="edge" x1="120" y1="64" x2="392" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5F3FC"/>
      <stop offset="0.5" stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 244) scale(96)">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.4" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </radialGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 244) scale(150)">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0H0V16" stroke="rgba(148,197,253,0.10)" stroke-width="1"/>
    </pattern>
    <clipPath id="shieldClip">
      <path d="M256 460C172 426 112 378 96 262V120L256 56L416 120V262C400 378 340 426 256 460Z"/>
    </clipPath>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- App background tile -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#grid)" opacity="0.5"/>

  <!-- Outer shield -->
  <path d="M256 460C172 426 112 378 96 262V120L256 56L416 120V262C400 378 340 426 256 460Z"
        fill="url(#shield)" stroke="url(#edge)" stroke-width="9" stroke-linejoin="round"/>

  <!-- Grid inside shield -->
  <g clip-path="url(#shieldClip)">
    <rect x="96" y="56" width="320" height="404" fill="url(#grid)" opacity="0.6"/>
    <!-- subtle top sheen -->
    <path d="M256 56L96 120V200C150 150 210 110 256 96Z" fill="rgba(255,255,255,0.10)"/>
  </g>

  <!-- Glow behind core -->
  <circle cx="256" cy="244" r="150" fill="url(#glow)"/>

  <!-- Neural / circuit nodes -->
  <g stroke="#DBEAFE" stroke-width="3.5" stroke-linecap="round" opacity="0.9">
    <path d="M256 158V196"/>
    <path d="M338 196L308 218"/>
    <path d="M338 300L308 278"/>
    <path d="M174 196L204 218"/>
    <path d="M174 300L204 278"/>
    <path d="M256 340V302"/>
  </g>
  <g fill="#E0F2FE">
    <circle cx="256" cy="152" r="9"/>
    <circle cx="344" cy="192" r="8"/>
    <circle cx="344" cy="304" r="8"/>
    <circle cx="168" cy="192" r="8"/>
    <circle cx="168" cy="304" r="8"/>
    <circle cx="256" cy="346" r="9"/>
  </g>

  <!-- AI core -->
  <circle cx="256" cy="244" r="92" fill="#020617" opacity="0.55"/>
  <circle cx="256" cy="244" r="84" fill="url(#core)"/>
  <circle cx="256" cy="244" r="60" fill="#0B1220" opacity="0.92"/>

  <!-- Stylized checkmark inside the core: trust / verified -->
  <path d="M222 246L246 272L296 214"
        stroke="#5EEAD4" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)" opacity="0.6"/>
  <path d="M222 246L246 272L296 214"
        stroke="#F8FAFC" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
